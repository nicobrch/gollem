name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify build artifacts are not tracked
        run: |
          tracked_artifacts=""
          for path in go-llm gollem; do
            if git ls-files --error-unmatch "$path" >/dev/null 2>&1; then
              tracked_artifacts="$tracked_artifacts $path"
            fi
          done

          if [ -n "$tracked_artifacts" ]; then
            echo "Tracked build artifacts found:$tracked_artifacts"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...
